<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Quick QR</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #0d0013;
            color: white;
            text-align: center;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 { margin: 0 0 10px; font-size: 24px; }
        p { color: #a1a1aa; margin: 0 0 20px; max-width: 280px; }
        button {
            background: #9333ea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 99px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection. Quick QR works best when assets are pre-cached.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
</body>
</html>
